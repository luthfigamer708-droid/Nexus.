<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Ultimate | Vision, Gen, & Motion</title>
    
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(15, 15, 15, 0.7);
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --text: #fafafa;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* Background Motion Canvas */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            filter: blur(2px);
        }

        /* Sidebar History */
        #sidebar {
            width: 280px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            position: absolute;
            left: -280px;
            height: 100%;
            z-index: 100;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        #sidebar.open { transform: translateX(280px); }

        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); }
        
        .btn-new-chat {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        #history-list { flex: 1; overflow-y: auto; padding: 15px; }
        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            font-size: 13px;
            color: #ccc;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }
        .history-item:hover { border-color: var(--accent); background: rgba(168, 85, 247, 0.1); }

        /* Main App Interface */
        #main-app {
            flex: 1;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Chat Bubbles */
        .msg { display: flex; gap: 15px; animation: fadeInUp 0.4s ease; }
        .msg.user { flex-direction: row-reverse; }
        .avatar { width: 35px; height: 35px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 10px var(--accent-glow); }
        .user .avatar { background: #333; }
        
        .bubble {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            line-height: 1.6;
            font-size: 15px;
            color: #eee;
        }
        .user .bubble { background: rgba(168, 85, 247, 0.2); border-color: var(--accent); border-bottom-right-radius: 4px; }
        .ai .bubble { border-bottom-left-radius: 4px; }

        .sent-img { max-width: 250px; border-radius: 15px; margin-bottom: 10px; display: block; border: 2px solid var(--border); }
        .gen-img { width: 100%; border-radius: 20px; margin-top: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

        /* Input Bar */
        .input-section { padding: 25px; background: linear-gradient(to top, var(--bg), transparent); }
        .input-card {
            max-width: 850px;
            margin: 0 auto;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
        }

        .preview-bar { display: none; padding: 10px; position: relative; }
        .preview-img { height: 60px; border-radius: 10px; border: 1px solid var(--accent); }
        .btn-remove-img { position: absolute; top: 0; left: 65px; background: #ef4444; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid var(--bg); }

        .input-row { display: flex; align-items: center; gap: 10px; }
        input[type="text"] {
            flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px;
        }

        .icon-btn { background: none; border: none; color: #888; cursor: pointer; padding: 8px; transition: 0.3s; border-radius: 50%; }
        .icon-btn:hover { color: var(--accent); background: rgba(168, 85, 247, 0.1); }
        .btn-send { background: var(--accent); color: white; width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px var(--accent-glow); }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; backdrop-filter: blur(5px); }

        /* Scrollbar */
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .file-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="overlay"></div>

<nav id="sidebar">
    <div class="sidebar-header">
        <button class="btn-new-chat" onclick="startNewChat()">✨ New Chat</button>
    </div>
    <div id="history-list"></div>
</nav>

<div id="main-app">
    <header>
        <button class="icon-btn" style="font-size: 24px; color: white;" id="btn-menu">☰</button>
        <div style="font-weight: 900; letter-spacing: 1px; font-size: 1.2rem;">NEXUS <span style="color:var(--accent)">ULTIMATE</span></div>
        <button class="icon-btn" onclick="toggleMotion()">🎬</button>
    </header>

    <div class="chat-area" id="chat-box"></div>

    <div class="input-section">
        <div class="input-card">
            <div class="preview-bar" id="preview-area">
                <img id="img-preview-src" src="">
                <div class="btn-remove-img" onclick="clearSelectedImage()">×</div>
            </div>
            <div class="input-row">
                <button class="icon-btn" onclick="document.getElementById('file-picker').click()">📎</button>
                <input type="file" id="file-picker" hidden accept="image/*" onchange="previewImage(event)">
                <input type="text" id="user-input" placeholder="Tanya, kirim screenshot, atau suruh gambar..." autocomplete="off">
                <button class="btn-send" id="btn-send">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; // Kunci API otomatis
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('btn-send');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuBtn = document.getElementById('btn-menu');
    const historyList = document.getElementById('history-list');

    let currentChatId = Date.now().toString();
    let memory = [];
    let historyData = JSON.parse(localStorage.getItem('nexus_ultimate_v1')) || {};
    let selectedImgBase64 = null;
    let isMotionActive = true;

    // --- MOTION ENGINE (Background) ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * canvas.width,
                o: Math.random()
            });
        }
    }

    function drawMotion() {
        if(!isMotionActive) return;
        ctx.fillStyle = "rgba(5, 5, 5, 0.2)";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        const cx = canvas.width/2;
        const cy = canvas.height/2;

        stars.forEach(s => {
            s.z -= 2;
            if(s.z <= 0) s.z = canvas.width;
            
            const x = (s.x - cx) * (canvas.width / s.z) + cx;
            const y = (s.y - cy) * (canvas.width / s.z) + cy;
            const size = (1 - s.z / canvas.width) * 3;
            
            ctx.fillStyle = `hsla(280, 70%, 70%, ${1 - s.z/canvas.width})`;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(drawMotion);
    }

    window.addEventListener('resize', initCanvas);
    initCanvas();
    drawMotion();

    function toggleMotion() { isMotionActive = !isMotionActive; if(isMotionActive) drawMotion(); }

    // --- UI LOGIC ---
    menuBtn.onclick = () => { sidebar.classList.add('open'); overlay.style.display = 'block'; };
    overlay.onclick = () => { sidebar.classList.remove('open'); overlay.style.display = 'none'; };

    function previewImage(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            selectedImgBase64 = ev.target.result.split(',')[1];
            document.getElementById('img-preview-src').src = ev.target.result;
            document.getElementById('preview-area').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearSelectedImage() {
        selectedImgBase64 = null;
        document.getElementById('preview-area').style.display = 'none';
        document.getElementById('file-picker').value = "";
    }

    function appendMsg(text, role, img = null, isGen = false) {
        const wrap = document.createElement('div');
        wrap.className = `msg ${role}`;
        
        let html = `<div class="avatar">${role === 'user' ? '👤' : '✨'}</div><div class="bubble">`;
        
        if(img && role === 'user') html += `<img src="data:image/png;base64,${img}" class="sent-img">`;
        
        if(isGen) {
            html += `<img src="${text}" class="gen-img"><br><button class="btn-new-chat" style="margin-top:10px" onclick="downloadImage('${text}')">Save Image</button>`;
        } else {
            html += processContent(text);
        }
        
        html += `</div>`;
        wrap.innerHTML = html;
        chatBox.appendChild(wrap);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    // --- AI LOGIC ---
    async function sendMessage() {
        const text = userInput.value.trim();
        if(!text && !selectedImgBase64) return;

        appendMsg(text, 'user', selectedImgBase64);
        userInput.value = "";
        const tempImg = selectedImgBase64;
        clearSelectedImage();

        const loaderId = 'L' + Date.now();
        const loadDiv = document.createElement('div');
        loadDiv.id = loaderId;
        loadDiv.className = 'msg ai';
        loadDiv.innerHTML = `<div class="avatar">✨</div><div class="bubble" style="color:#777">Nexus lagi cooking... 🔥</div>`;
        chatBox.appendChild(loadDiv);

        const isGenImg = /gambar|image|lukis|foto|buatkan|generate/i.test(text) && text.length < 80;

        try {
            if(isGenImg) {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({ instances: [{ prompt: text }], parameters: { sampleCount: 1 } })
                });
                const data = await res.json();
                loadDiv.remove();
                appendMsg(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`, 'ai', null, true);
            } else {
                const parts = [{ text: text || "Apa isi gambar ini?" }];
                if(tempImg) parts.push({ inlineData: { mimeType: "image/png", data: tempImg } });
                
                // Add to persistent memory for this session
                memory.push({ role: "user", parts: parts });

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: memory,
                        systemInstruction: { parts: [{ text: "Nama kamu Nexus AI. Kamu asisten Gen Z paling slay. Kamu bisa liat screenshot, bikin gambar, dan buat file. Jika disuruh buat file, gunakan format: [FILE:nama.ext]isi[/FILE]. Ingat konteks obrolan sebelumnya." }] }
                    })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                loadDiv.remove();
                appendMsg(reply, 'ai');
                memory.push({ role: "model", parts: [{ text: reply }] });
                saveHistory(text || "Analisis Gambar");
            }
        } catch (e) {
            loadDiv.innerHTML = `<div class="bubble" style="color:red">Gagal koneksi ngab. Ghosting nih!</div>`;
        }
    }

    // --- STORAGE & HELPERS ---
    function saveHistory(title) {
        if(!historyData[currentChatId]) historyData[currentChatId] = { title, memory: [] };
        historyData[currentChatId].memory = memory;
        localStorage.setItem('nexus_ultimate_v1', JSON.stringify(historyData));
        renderSidebar();
    }

    function renderSidebar() {
        historyList.innerHTML = '';
        Object.keys(historyData).sort().reverse().forEach(id => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = historyData[id].title;
            div.onclick = () => loadChat(id);
            historyList.appendChild(div);
        });
    }

    function loadChat(id) {
        currentChatId = id;
        memory = historyData[id].memory;
        chatBox.innerHTML = '';
        memory.forEach(m => appendMsg(m.parts[0].text, m.role === 'user' ? 'user' : 'ai', m.parts[1]?.inlineData?.data));
        sidebar.classList.remove('open'); overlay.style.display = 'none';
    }

    function startNewChat() {
        currentChatId = Date.now().toString(); memory = [];
        chatBox.innerHTML = '<div class="msg ai"><div class="avatar">✨</div><div class="bubble">Yo! Nexus AI Ultimate ready. Kirim screenshot, suruh gue gambar, atau minta gue bikinin file apa aja. No cap, kita masak apa hari ini? 🔥</div></div>';
        sidebar.classList.remove('open'); overlay.style.display = 'none';
    }

    function processContent(t) {
        // File handling
        const fileRegex = /\[FILE:\s*(.+?)\]([\s\S]*?)\[\/FILE\]/g;
        let match;
        let out = t;
        while ((match = fileRegex.exec(t)) !== null) {
            const fname = match[1]; const content = match[2];
            const idx = window.vault ? window.vault.length : 0;
            if(!window.vault) window.vault = [];
            window.vault.push({fname, content});
            out = out.replace(match[0], `<div class="file-card"><span>📦 ${fname}</span><button class="btn-new-chat" style="width:auto; padding:5px 15px" onclick="dlFile(${idx})">Download</button></div>`);
        }
        return out.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>').replace(/\n/g, '<br>');
    }

    window.dlFile = (i) => {
        const f = window.vault[i];
        const b = new Blob([f.content], {type:'text/plain'});
        const u = URL.createObjectURL(b);
        const a = document.createElement('a'); a.href = u; a.download = f.fname; a.click();
    };

    window.downloadImage = (url) => {
        const a = document.createElement('a'); a.href = url; a.download = `NexusGen_${Date.now()}.png`; a.click();
    };

    sendBtn.onclick = sendMessage;
    userInput.onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };
    renderSidebar();
    startNewChat();
</script>

</body>
</html>
